name: Build SSH MountMate

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSHMountMate-windows
          - os: macos-latest
            artifact: SSHMountMate-macos
          - os: ubuntu-latest
            artifact: SSHMountMate-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: python -m pip install -e ".[build]"
      - name: Build local artifact
        run: python build/build_local.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
