name: Update Release Notes

on:
  push:
    branches:
      - main
    paths:
      - "release-notes/v*.md"
      - ".github/workflows/release-notes.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Update release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="$(find release-notes -maxdepth 1 -name 'v*.md' -printf '%f\n' | sort -V | tail -n 1)"
            TAG="${TAG%.md}"
          fi

          NOTES="release-notes/${TAG}.md"
          if [ ! -f "${NOTES}" ]; then
            echo "Release notes not found: ${NOTES}" >&2
            exit 1
          fi

          gh release edit "${TAG}" --notes-file "${NOTES}" --repo "${GITHUB_REPOSITORY}"
