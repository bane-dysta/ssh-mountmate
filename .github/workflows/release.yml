name: Release SSH MountMate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: SSHMountMate-windows-x64.zip
          - os: macos-latest
            asset: SSHMountMate-macos-arm64-x64.zip
          - os: ubuntu-latest
            asset: SSHMountMate-linux-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build executable
        run: python build/build_local.py

      - name: Package asset
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          root = Path(".")
          dist = root / "dist"
          release = root / "release"
          release.mkdir(parents=True, exist_ok=True)
          asset = release / "${{ matrix.asset }}"

          with zipfile.ZipFile(asset, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in dist.rglob("*"):
                  if path.is_file():
                      zf.write(path, path.relative_to(dist))

          print(asset)

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          fi

          mapfile -t FILES < <(find release-assets -type f | sort)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "SSH MountMate ${TAG}" \
              --notes "Cross-platform Python build of SSH MountMate."
          fi
