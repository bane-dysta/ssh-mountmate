name: Build SSH MountMate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSHMountMate-windows-x64
          - os: macos-13
            artifact: SSHMountMate-macos-x64
          - os: macos-14
            artifact: SSHMountMate-macos-arm64
          - os: ubuntu-latest
            artifact: SSHMountMate-linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build artifact
        run: python build/build_local.py

      - name: List artifacts
        shell: bash
        run: find dist -maxdepth 2 -type f -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
