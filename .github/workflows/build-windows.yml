name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build SSHMountMate.exe
        shell: pwsh
        run: .\scripts\build-windows-exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSHMountMate-windows
          path: dist\SSHMountMate.exe
